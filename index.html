<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>李流し — Rinagashi</title>
<style>
  :root {
    --paper: #f3eee3;
    --ink-text: #3c372f;
    --ink-sub: #8d8478;
  }
  html, body { margin: 0; height: 100%; overflow: hidden; background: var(--paper); }
  body { font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif; }

  #paper, #ink, #text {
    position: fixed; inset: 0; width: 100vw; height: 100vh; display: block;
  }
  #ink { mix-blend-mode: multiply; touch-action: none; cursor: crosshair; }
  #text { mix-blend-mode: multiply; pointer-events: none; }

  /* ===== タイトル ===== */
  header {
    position: fixed; top: 26px; left: 26px; z-index: 5;
    display: flex; gap: 18px; pointer-events: none;
    -webkit-writing-mode: vertical-rl; writing-mode: vertical-rl;
  }
  h1 {
    margin: 0; font-size: 34px; font-weight: 500; color: var(--ink-text);
    letter-spacing: 14px;
  }
  .subtitle {
    margin-top: 10px; font-size: 10px; color: var(--ink-sub);
    letter-spacing: 5px; text-transform: uppercase;
  }

  /* ===== ツールバー ===== */
  #toolbar {
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; align-items: center; justify-content: center;
    flex-wrap: wrap; gap: 6px 14px;
    max-width: min(92vw, 780px); box-sizing: border-box;
    padding: 10px 22px; border-radius: 26px;
    background: rgba(250, 247, 240, 0.78);
    border: 1px solid rgba(70, 60, 45, 0.14);
    box-shadow: 0 8px 28px rgba(70, 60, 45, 0.10);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  #phrases {
    display: flex; align-items: center; justify-content: center;
    flex-wrap: wrap; gap: 2px 12px;
  }
  .chip {
    border: none; background: none; padding: 4px 4px 2px; cursor: pointer;
    font-family: inherit; font-size: 13px; letter-spacing: 2px;
    color: var(--ink-sub); white-space: nowrap; touch-action: manipulation;
    border-bottom: 1px solid transparent;
    transition: color .15s ease, border-color .15s ease;
  }
  .chip:hover { color: var(--ink-text); }
  .chip.active {
    color: var(--ink-text);
    border-bottom-color: rgba(70, 60, 45, 0.55);
  }
  .hint {
    font-size: 10px; color: var(--ink-sub); letter-spacing: 2px;
    margin-left: 6px; white-space: nowrap;
  }
  .chip.purge { color: #8f3a34; letter-spacing: 3px; }
  .chip.purge:hover { color: #6e2a25; }
  .divider { width: 1px; height: 20px; background: rgba(70, 60, 45, 0.18); }
  .tbtn {
    border: none; background: none; padding: 4px 2px; cursor: pointer;
    font-family: inherit; font-size: 13px; letter-spacing: 4px;
    color: var(--ink-text); display: flex; align-items: center; gap: 8px;
    white-space: nowrap; touch-action: manipulation;
  }
  .tbtn:hover { color: #000; }
  #autoBtn .dot {
    width: 8px; height: 8px; border-radius: 50%; flex: none;
    border: 1.5px solid #2e4e86; background: transparent;
    transition: background .2s ease;
  }
  #autoBtn.on .dot { background: #2e4e86; }

  /* ===== モバイル ===== */
  @media (max-width: 480px) {
    header { top: 18px; left: 16px; gap: 12px; }
    h1 { font-size: 22px; letter-spacing: 9px; }
    .subtitle { font-size: 8px; letter-spacing: 3px; }
    #toolbar {
      gap: 4px 10px; padding: 8px 12px;
      bottom: calc(14px + env(safe-area-inset-bottom));
      max-width: calc(100vw - 20px);
    }
    #phrases { gap: 0 8px; }
    .chip { font-size: 11px; letter-spacing: 1px; }
    .tbtn { font-size: 12px; letter-spacing: 1px; gap: 5px; }
  }
</style>
</head>
<body>

<canvas id="paper"></canvas>
<canvas id="ink"></canvas>
<canvas id="text"></canvas>

<header>
  <h1>李流し</h1>
  <div class="subtitle">Rinagashi — Ink Dissolution</div>
</header>

<div id="toolbar">
  <!-- 言葉はJSで生成 -->
  <div id="phrases"></div>
  <div class="divider"></div>
  <button id="autoBtn" class="tbtn on"><span class="dot"></span>自動演出</button>
  <button id="washBtn" class="tbtn">洗い流す</button>
</div>

<script>
(() => {
'use strict';

// ===== 調整用定数 =====
const INK_SCALE = 0.6;              // 内部解像度（CSS pxに対する比率）
const MAX_PARTICLES = 2600;         // 模様（インク）の粒子上限
const MAX_TEXT_PARTICLES = 2600;    // 文字の粒子上限
const FADE_INTERVAL_FRAMES = 60;    // 模様の退色を適用する間隔
const FADE_ALPHA = 0.02;            // 模様の1回の退色量（〜2.5分で消える）
const BLUR_INTERVAL_FRAMES = 4;     // 模様の滲み拡散の間隔
const BLUR_RADIUS_PX = 0.8;
const TEXT_FADE_PER_SEC = 1.4;      // 文字レイヤーの退色速度（1秒あたりの減衰率）
const TEXT_BLUR_INTERVAL_FRAMES = 5;
const TEXT_BLUR_RADIUS_PX = 0.8;
const FLOW_STRENGTH = 5200;         // 流れ場の強さ
const FLOW_TIME_SCALE = 0.03;       // 流れ場の時間変化速度
const FLOW_NOISE_SCALE = 0.0045;    // 流れ場の空間スケール
const WASH_DURATION_S = 1.3;        // 「洗い流す」の所要時間
const AUTO_WAIT_MIN_S = 4;
const AUTO_WAIT_MAX_S = 9;
const DROP_SPACING_PX = 4;          // ストローク中に滴を落とす間隔
const GLYPH_FONT_PX = 100;          // 言葉を点群化するときのフォントサイズ
const GLYPH_SAMPLE_STEP = 4;        // グリフを点群化する間引き幅

// 選ぶ名前（label）と、タップで書かれるメッセージ（text）、その墨色
const PHRASES = [
  { label: '紘代', text: '結論からしゃべれ', color: '#bc4540' },
  { label: '祐子', text: 'コネんな', color: '#2e4e86' },
  { label: 'めぐ', text: 'ありさに聞け', color: '#41785c' },
  { label: '誠', text: 'クビです', color: '#6b4a7e' },
];
// 最後に押す言葉。押すと画面の文字が崩れ落ちる
const PURGE_PHRASE = { label: 'パージや', text: 'パージや', color: '#2a2833' };
const PURGE_DELAY_S = 1.0;          // 「パージや」を読ませてから崩すまでの間
const PURGE_DURATION_S = 2.4;       // 崩れ落ち演出の長さ
const PURGE_GRAVITY = 700;          // 崩れ落ちる粒子の重力
// 崩れ落ちた後、最後に咲く大きなハート
const HEART_PHRASE = { label: '❤️', text: '❤️', color: '#bc4540' };

// 自動演出が使う墨色（黒系は重いので淡色のみ）
const INK_COLORS = [
  ['#a8403a'],
  ['#2e4e86'],
  ['#bc4540'],
  ['#41785c'],
];

// ===== 要素 =====
const inkCanvas = document.getElementById('ink');
const textCanvas = document.getElementById('text');
const paperCanvas = document.getElementById('paper');
const ctx = inkCanvas.getContext('2d');
const tctx = textCanvas.getContext('2d');

// ===== 状態 =====
let selectedIndex = 0;
let isAutoOn = true;
let particles = [];      // 模様の粒子（インクレイヤー）
let textParticles = [];  // 文字の粒子（文字レイヤー）
let strokes = [];
let washEndAt = -1;
let purgeStartAt = -1;
let purgeEndAt = -1;
let frameCount = 0;
let lastTs = 0;
let elapsedSec = 0;
let autoNextAt = 0.8;

// ===== ノイズ（値ノイズ + カール場） =====
function hash2(ix, iy) {
  const n = Math.sin(ix * 127.1 + iy * 311.7) * 43758.5453;
  return n - Math.floor(n);
}
function smoothstep01(t) { return t * t * (3 - 2 * t); }
function noise2(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  const a = hash2(ix, iy), b = hash2(ix + 1, iy);
  const c = hash2(ix, iy + 1), d = hash2(ix + 1, iy + 1);
  const u = smoothstep01(fx), v = smoothstep01(fy);
  return a + (b - a) * u + (c - a) * v + (a - b - c + d) * u * v;
}
// 発散ゼロのカールノイズ：インクが「流れている」ように見せる
function flowAt(x, y, t) {
  const s = FLOW_NOISE_SCALE, e = 1.2;
  const nx1 = noise2((x + e) * s, y * s + t);
  const nx0 = noise2((x - e) * s, y * s + t);
  const ny1 = noise2(x * s, (y + e) * s + t);
  const ny0 = noise2(x * s, (y - e) * s + t);
  return { vx: (ny1 - ny0) * FLOW_STRENGTH, vy: -(nx1 - nx0) * FLOW_STRENGTH };
}

// ===== スプライト（柔らかい円形のインク滴） =====
const spriteCache = new Map();
function getSplat(color) {
  if (spriteCache.has(color)) return spriteCache.get(color);
  const size = 64;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
  grad.addColorStop(0, color);
  grad.addColorStop(0.55, color + 'aa');
  grad.addColorStop(1, color + '00');
  g.fillStyle = grad;
  g.fillRect(0, 0, size, size);
  spriteCache.set(color, c);
  return c;
}

// ===== 紙テクスチャ =====
function drawPaper() {
  const w = paperCanvas.width = window.innerWidth;
  const h = paperCanvas.height = window.innerHeight;
  const g = paperCanvas.getContext('2d');
  g.fillStyle = '#f3eee3';
  g.fillRect(0, 0, w, h);
  // 繊維っぽい粒状ノイズをタイルで生成
  const tile = document.createElement('canvas');
  tile.width = tile.height = 256;
  const tg = tile.getContext('2d');
  const img = tg.createImageData(256, 256);
  for (let i = 0; i < img.data.length; i += 4) {
    const v = Math.random();
    const dark = v < 0.5;
    img.data[i] = dark ? 110 : 255;
    img.data[i + 1] = dark ? 95 : 252;
    img.data[i + 2] = dark ? 75 : 244;
    img.data[i + 3] = Math.random() * 14;
  }
  tg.putImageData(img, 0, 0);
  g.fillStyle = g.createPattern(tile, 'repeat');
  g.fillRect(0, 0, w, h);
  // 周辺を僅かに落とすビネット
  const vg = g.createRadialGradient(w / 2, h / 2, Math.min(w, h) * 0.35, w / 2, h / 2, Math.max(w, h) * 0.75);
  vg.addColorStop(0, 'rgba(120,100,75,0)');
  vg.addColorStop(1, 'rgba(120,100,75,0.06)');
  g.fillStyle = vg;
  g.fillRect(0, 0, w, h);
}

// ===== キャンバスのリサイズ（模様は保持・文字は儚いので白紙に戻す） =====
function resizeInk() {
  const newW = Math.max(2, Math.floor(window.innerWidth * INK_SCALE));
  const newH = Math.max(2, Math.floor(window.innerHeight * INK_SCALE));
  const old = document.createElement('canvas');
  old.width = inkCanvas.width || 1;
  old.height = inkCanvas.height || 1;
  if (inkCanvas.width) old.getContext('2d').drawImage(inkCanvas, 0, 0);
  inkCanvas.width = newW;
  inkCanvas.height = newH;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, newW, newH);
  if (old.width > 2) ctx.drawImage(old, 0, 0, newW, newH);
  textCanvas.width = newW;
  textCanvas.height = newH;
  tctx.fillStyle = '#ffffff';
  tctx.fillRect(0, 0, newW, newH);
}

// ===== インク滴の生成 =====
function randomBetween(a, b) { return a + Math.random() * (b - a); }
function pickColor(cols) { return cols[Math.floor(Math.random() * cols.length)]; }
function clamp(v, lo, hi) { return Math.min(Math.max(v, lo), hi); }

function spawnDrop(x, y, cols, strength) {
  const count = Math.round(3 + strength * 4);
  for (let i = 0; i < count; i++) {
    const ang = Math.random() * Math.PI * 2;
    const off = Math.random() * 9 * strength;
    particles.push({
      x: x + Math.cos(ang) * off,
      y: y + Math.sin(ang) * off,
      age: 0,
      life: randomBetween(4, 9),
      r0: randomBetween(2, 5) * (0.6 + strength * 0.5),
      r1: randomBetween(16, 40) * (0.6 + strength * 0.6),
      alpha: randomBetween(0.002, 0.006),
      mobility: randomBetween(0.6, 1.4),
      sprite: getSplat(pickColor(cols)),
    });
  }
  if (particles.length > MAX_PARTICLES) {
    particles.splice(0, particles.length - MAX_PARTICLES);
  }
}

// ===== 言葉の点群化と墨書き =====
const phrasePointsCache = new Map();
function getPhrasePoints(text) {
  if (phrasePointsCache.has(text)) return phrasePointsCache.get(text);
  const font = GLYPH_FONT_PX + 'px "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif';
  const mc = document.createElement('canvas');
  let g = mc.getContext('2d');
  g.font = font;
  const tw = Math.ceil(g.measureText(text).width);
  mc.width = tw + 40;
  mc.height = Math.ceil(GLYPH_FONT_PX * 1.6);
  g = mc.getContext('2d'); // サイズ変更でコンテキスト状態が初期化されるため再設定
  g.font = font;
  g.fillStyle = '#000';
  g.textAlign = 'center';
  g.textBaseline = 'middle';
  g.fillText(text, mc.width / 2, mc.height / 2);
  const data = g.getImageData(0, 0, mc.width, mc.height).data;
  const pts = [];
  for (let y = 0; y < mc.height; y += GLYPH_SAMPLE_STEP) {
    for (let x = 0; x < mc.width; x += GLYPH_SAMPLE_STEP) {
      if (data[(y * mc.width + x) * 4 + 3] > 128) {
        pts.push({ x: x - mc.width / 2, y: y - mc.height / 2 });
      }
    }
  }
  const entry = { pts, width: tw };
  phrasePointsCache.set(text, entry);
  return entry;
}

// 指を離した場所に選択中の言葉を墨で書く（文字レイヤーに置くので数秒で溶けて消える）
function spawnPhrase(cx, cy, phrase, lifeMin, lifeMax, maxHFactor) {
  const w = textCanvas.width, h = textCanvas.height;
  const glyph = getPhrasePoints(phrase.text);
  const maxW = w * 0.86;
  const maxH = Math.min(h * (maxHFactor || 0.26), maxHFactor ? 240 : 110);
  const scale = Math.min(maxH / GLYPH_FONT_PX, maxW / glyph.width);
  const halfW = (glyph.width * scale) / 2 + 8;
  const halfH = GLYPH_FONT_PX * scale * 0.8;
  const x0 = clamp(cx, halfW, w - halfW);
  const y0 = clamp(cy, halfH, h - halfH);
  const rBase = Math.max(0.6, scale);
  for (const pt of glyph.pts) {
    textParticles.push({
      x: x0 + pt.x * scale + (Math.random() - 0.5) * 2,
      y: y0 + pt.y * scale + (Math.random() - 0.5) * 2,
      age: 0,
      life: randomBetween(lifeMin || 1.8, lifeMax || 3.2),
      r0: randomBetween(2, 3.5) * rBase,
      r1: randomBetween(5, 9) * rBase,
      alpha: randomBetween(0.06, 0.11),
      mobility: randomBetween(0.1, 0.3),
      vy: 0,
      sprite: getSplat(phrase.color),
    });
  }
  if (textParticles.length > MAX_TEXT_PARTICLES) {
    textParticles.splice(0, textParticles.length - MAX_TEXT_PARTICLES);
  }
}

// ===== 自動演出（筆が独りでに泳ぐ） =====
function makeStroke() {
  const w = inkCanvas.width, h = inkCanvas.height;
  const cols = INK_COLORS[Math.floor(Math.random() * INK_COLORS.length)];
  return {
    x: randomBetween(w * 0.1, w * 0.9),
    y: randomBetween(h * 0.1, h * 0.9),
    dir: Math.random() * Math.PI * 2,
    speed: randomBetween(28, 70),
    cols: cols,
    tLeft: randomBetween(4, 9),
    seed: Math.random() * 100,
    acc: 0,
  };
}

function updateStrokes(dt) {
  for (let i = strokes.length - 1; i >= 0; i--) {
    const s = strokes[i];
    s.tLeft -= dt;
    // ノイズでゆっくり蛇行させる
    s.dir += (noise2(s.seed, elapsedSec * 0.3) - 0.5) * 5 * dt;
    const f = flowAt(s.x, s.y, elapsedSec * FLOW_TIME_SCALE);
    s.x += (Math.cos(s.dir) * s.speed + f.vx * 0.4) * dt;
    s.y += (Math.sin(s.dir) * s.speed + f.vy * 0.4) * dt;
    s.acc += s.speed * dt;
    if (s.acc >= DROP_SPACING_PX * 2) {
      s.acc = 0;
      spawnDrop(s.x, s.y, s.cols, randomBetween(0.3, 0.6));
    }
    const out = s.x < -40 || s.x > inkCanvas.width + 40 || s.y < -40 || s.y > inkCanvas.height + 40;
    if (s.tLeft <= 0 || out) strokes.splice(i, 1);
  }
}

// ===== 粒子の更新・描画（模様・文字共通） =====
function updateParticleList(list, target, dt, hasGravity) {
  const flowT = elapsedSec * FLOW_TIME_SCALE;
  for (let i = list.length - 1; i >= 0; i--) {
    const p = list[i];
    p.age += dt;
    if (p.age >= p.life) { list.splice(i, 1); continue; }
    const f = flowAt(p.x, p.y, flowT);
    // 字形を保つ粒子（mobility小）は流れにも揺らぎにも乗りにくい
    p.x += (f.vx + (Math.random() - 0.5) * 44) * p.mobility * dt;
    p.y += (f.vy + (Math.random() - 0.5) * 44) * p.mobility * dt;
    if (hasGravity) {
      // パージ中：粒子が崩れ落ちる
      p.vy = (p.vy || 0) + PURGE_GRAVITY * dt;
      p.y += p.vy * dt;
      p.x += (Math.random() - 0.5) * 30 * dt;
    }
    const q = p.age / p.life;
    const r = p.r0 + (p.r1 - p.r0) * Math.pow(q, 0.65);
    target.globalAlpha = p.alpha * Math.pow(1 - q, 1.4);
    target.drawImage(p.sprite, p.x - r, p.y - r, r * 2, r * 2);
  }
  target.globalAlpha = 1;
}

// 自分自身を僅かにぼかして描き直す＝水中での滲み
function selfBlur(canvas, context, radius) {
  context.filter = 'blur(' + radius + 'px)';
  context.drawImage(canvas, 0, 0);
  context.filter = 'none';
}

// ===== メインループ =====
function tick(ts) {
  const dt = Math.min(0.05, (ts - lastTs) / 1000 || 0.016);
  lastTs = ts;
  elapsedSec += dt;
  frameCount++;

  if (washEndAt >= 0 && elapsedSec < washEndAt) {
    // フレームレートに依存しないよう、退色量はdtに比例させる
    const a = Math.min(0.35, 8 * dt);
    ctx.fillStyle = 'rgba(255,255,255,' + a + ')';
    ctx.fillRect(0, 0, inkCanvas.width, inkCanvas.height);
    selfBlur(inkCanvas, ctx, 1.4);
    tctx.fillStyle = 'rgba(255,255,255,' + a + ')';
    tctx.fillRect(0, 0, textCanvas.width, textCanvas.height);
  } else if (washEndAt >= 0) {
    // 演出終了時に完全な白へ戻す（確実に洗い上がる）
    washEndAt = -1;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, inkCanvas.width, inkCanvas.height);
    tctx.fillStyle = '#ffffff';
    tctx.fillRect(0, 0, textCanvas.width, textCanvas.height);
  } else {
    // 模様レイヤー：ゆっくり退色・滲み
    if (frameCount % FADE_INTERVAL_FRAMES === 0) {
      ctx.fillStyle = 'rgba(255,255,255,' + FADE_ALPHA + ')';
      ctx.fillRect(0, 0, inkCanvas.width, inkCanvas.height);
    }
    if (frameCount % BLUR_INTERVAL_FRAMES === 0) selfBlur(inkCanvas, ctx, BLUR_RADIUS_PX);
    // 文字レイヤー：時間比例で退色して数秒で溶ける（フレームレート非依存）
    tctx.fillStyle = 'rgba(255,255,255,' + Math.min(0.3, TEXT_FADE_PER_SEC * dt) + ')';
    tctx.fillRect(0, 0, textCanvas.width, textCanvas.height);
    // 低アルファ退色は白に近づくと量子化で止まるため、定期的に強めに掃いて薄い染みを根絶する
    if (frameCount % 120 === 0) {
      tctx.fillStyle = 'rgba(255,255,255,0.1)';
      tctx.fillRect(0, 0, textCanvas.width, textCanvas.height);
    }
    // パージ演出：文字レイヤーを下方向へ流しながら崩す → 終わったら大きなハート
    if (purgeStartAt >= 0 && elapsedSec >= purgeStartAt) {
      if (elapsedSec < purgeEndAt) {
        const fallSpeed = 120 + 700 * (elapsedSec - purgeStartAt);
        tctx.globalAlpha = 0.9;
        tctx.drawImage(textCanvas, 0, Math.max(1.5, fallSpeed * dt));
        tctx.globalAlpha = 1;
      } else {
        purgeStartAt = -1;
        purgeEndAt = -1;
        spawnPhrase(textCanvas.width / 2, textCanvas.height * 0.45, HEART_PHRASE, 3.5, 5.5, 0.55);
      }
    }
    if (frameCount % TEXT_BLUR_INTERVAL_FRAMES === 0) selfBlur(textCanvas, tctx, TEXT_BLUR_RADIUS_PX);
  }

  if (isAutoOn && elapsedSec >= autoNextAt) {
    strokes.push(makeStroke());
    autoNextAt = elapsedSec + randomBetween(AUTO_WAIT_MIN_S, AUTO_WAIT_MAX_S);
  }

  updateStrokes(dt);
  const isPurging = purgeStartAt >= 0 && elapsedSec >= purgeStartAt;
  updateParticleList(particles, ctx, dt, false);
  updateParticleList(textParticles, tctx, dt, isPurging);
  requestAnimationFrame(tick);
}

// ===== ポインタ操作 =====
let isDrawing = false;
let lastPx = 0, lastPy = 0, moveAcc = 0, movedTotal = 0;

function toInkCoords(e) {
  const r = inkCanvas.getBoundingClientRect();
  return {
    x: (e.clientX - r.left) / r.width * inkCanvas.width,
    y: (e.clientY - r.top) / r.height * inkCanvas.height,
  };
}

inkCanvas.addEventListener('pointerdown', (e) => {
  isDrawing = true;
  movedTotal = 0;
  moveAcc = 0;
  const p = toInkCoords(e);
  lastPx = p.x; lastPy = p.y;
  try { inkCanvas.setPointerCapture(e.pointerId); } catch (_) { /* 合成イベントでは失敗してよい */ }
});

inkCanvas.addEventListener('pointermove', (e) => {
  if (!isDrawing) return;
  const p = toInkCoords(e);
  const dx = p.x - lastPx, dy = p.y - lastPy;
  const dist = Math.hypot(dx, dy);
  movedTotal += dist;
  // イベント間隔が粗くても途切れないよう、線分上を等間隔で補間して滴を落とす
  const strength = Math.min(1.2, 0.4 + dist * 0.04);
  moveAcc += dist;
  let travelled = 0;
  while (moveAcc >= DROP_SPACING_PX && dist > 0) {
    moveAcc -= DROP_SPACING_PX;
    travelled += DROP_SPACING_PX;
    const t = Math.min(1, travelled / dist);
    spawnDrop(lastPx + dx * t, lastPy + dy * t, [PHRASES[selectedIndex].color], strength);
  }
  lastPx = p.x; lastPy = p.y;
});

inkCanvas.addEventListener('pointerup', (e) => {
  if (!isDrawing) return;
  isDrawing = false;
  // タップでもドラッグでも、指を離した場所に選択中の言葉が書かれる
  const p = toInkCoords(e);
  spawnPhrase(p.x, p.y, PHRASES[selectedIndex]);
});

// ===== UI 構築 =====
const phrasesEl = document.getElementById('phrases');
PHRASES.forEach((entry, i) => {
  const btn = document.createElement('button');
  btn.className = 'chip' + (i === selectedIndex ? ' active' : '');
  btn.textContent = entry.label;
  btn.addEventListener('click', () => {
    selectedIndex = i;
    phrasesEl.querySelectorAll('.chip:not(.purge)').forEach((b, j) => {
      b.classList.toggle('active', j === i);
    });
  });
  phrasesEl.appendChild(btn);
});

// 「パージや」は選択肢ではなく、最後に押す特別ボタン
const purgeHint = document.createElement('span');
purgeHint.className = 'hint';
purgeHint.textContent = '最後は…';
phrasesEl.appendChild(purgeHint);

const purgeBtn = document.createElement('button');
purgeBtn.className = 'chip purge';
purgeBtn.textContent = PURGE_PHRASE.label;
purgeBtn.addEventListener('click', () => {
  if (purgeStartAt >= 0) return; // 演出中の連打は無視
  spawnPhrase(textCanvas.width / 2, textCanvas.height * 0.45, PURGE_PHRASE, 2.8, 4.2);
  purgeStartAt = elapsedSec + PURGE_DELAY_S;
  purgeEndAt = purgeStartAt + PURGE_DURATION_S;
});
phrasesEl.appendChild(purgeBtn);

const autoBtn = document.getElementById('autoBtn');
autoBtn.addEventListener('click', () => {
  isAutoOn = !isAutoOn;
  autoBtn.classList.toggle('on', isAutoOn);
  if (isAutoOn) autoNextAt = elapsedSec + 0.5;
});

document.getElementById('washBtn').addEventListener('click', () => {
  washEndAt = elapsedSec + WASH_DURATION_S;
  particles = [];
  textParticles = [];
  strokes = [];
});

// ===== 初期化 =====
window.addEventListener('resize', () => { resizeInk(); drawPaper(); });
drawPaper();
resizeInk();
// 最初から少し模様が漂っているように
strokes.push(makeStroke());
strokes.push(makeStroke());
requestAnimationFrame(tick);

})();
</script>
